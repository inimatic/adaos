name: AdaOS Version Bump

on:
  workflow_run:
    workflows: ["AdaOS CI"]
    types: [completed]
    branches: [rev2026]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: adaos-version-bump-rev2026
  cancel-in-progress: false

jobs:
  bump:
    name: Bump patch version
    if: >-
      ${{
        github.event_name == 'workflow_dispatch' ||
        (
          github.event.workflow_run.conclusion == 'success' &&
          github.event.workflow_run.event == 'push' &&
          github.event.workflow_run.head_branch == 'rev2026'
        )
      }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout rev2026
        uses: actions/checkout@v4
        with:
          ref: rev2026
          fetch-depth: 0

      - name: Check branch head
        id: head
        shell: bash
        run: |
          set -euo pipefail
          skip=false
          if [[ "${{ github.event_name }}" == "workflow_run" ]]; then
            expected="${{ github.event.workflow_run.head_sha }}"
            actual="$(git rev-parse HEAD)"
            if [[ "$actual" != "$expected" ]]; then
              echo "Branch moved from ${expected} to ${actual}; skipping stale bump."
              skip=true
            fi
            message="$(git log -1 --format=%s)"
            if [[ "$message" == chore:\ bump\ adaos\ version* ]]; then
              echo "Latest commit is already an AdaOS version bump; skipping."
              skip=true
            fi
          fi
          echo "skip=${skip}" >> "$GITHUB_OUTPUT"

      - name: Setup Python
        if: steps.head.outputs.skip != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Bump pyproject patch version
        if: steps.head.outputs.skip != 'true'
        id: bump
        shell: bash
        run: |
          set -euo pipefail
          old_version="$(python tools/bump_adaos_patch_version.py --current)"
          new_version="$(python tools/bump_adaos_patch_version.py)"
          echo "old_version=${old_version}" >> "$GITHUB_OUTPUT"
          echo "new_version=${new_version}" >> "$GITHUB_OUTPUT"
          echo "Bumped AdaOS ${old_version} -> ${new_version}"

      - name: Commit version bump
        if: steps.head.outputs.skip != 'true'
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet -- pyproject.toml; then
            echo "No version change to commit."
            exit 0
          fi
          git config user.name "AdaOS CI Bot"
          git config user.email "ci-bot@example.com"
          git add pyproject.toml
          git commit -m "chore: bump adaos version to ${{ steps.bump.outputs.new_version }}"
          git push origin HEAD:rev2026
