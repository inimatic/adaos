name: AdaOS CI

on:
  push:
    branches: [rev2026]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  tests:
    name: Python tests
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python: ["3.11"]
    runs-on: ${{ matrix.os }}
    env:
      PYTHONIOENCODING: utf-8
      MONOREPO_URL: ${{ secrets.ADAOS_MONOREPO_URL || 'https://github.com/inimatic/adaoskills.git' }}
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      GIT_AUTHOR_NAME: "AdaOS CI Bot"
      GIT_AUTHOR_EMAIL: "ci-bot@example.com"
      GIT_COMMITTER_NAME: "AdaOS CI Bot"
      GIT_COMMITTER_EMAIL: "ci-bot@example.com"
      ADAOS_TESTING: "1"
    steps:
      - name: Force UTF-8 on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          chcp.com 65001 > $null
          [Console]::OutputEncoding = [System.Text.UTF8Encoding]::new()
          $PSDefaultParameterValues['Out-File:Encoding'] = 'utf8'
          $env:PYTHONUTF8=1

      - name: Force UTF-8 on Linux
        if: runner.os == 'Linux'
        run: |
          export PYTHONUTF8=1
          export PYTHONIOENCODING=utf-8

      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ github.token }}

      - name: Setup Python ${{ matrix.python }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: "pip"

      - name: Install project (editable) + dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install -e .[dev]

      - name: Run SDK tests (only)
        run: |
          adaos tests run --only-sdk -- --junitxml=reports/sdk-junit.xml -q

      - name: Run skills tests
        run: |
          adaos tests run -- -q --junitxml=reports/skills-junit.xml

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-${{ matrix.os }}-py${{ matrix.python }}
          path: reports/*.xml

  bump_patch_version:
    name: Bump patch version
    needs: tests
    if: >-
      ${{
        github.event_name == 'push' &&
        github.ref == 'refs/heads/rev2026' &&
        !startsWith(github.event.head_commit.message, 'chore: bump adaos version')
      }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout rev2026
        uses: actions/checkout@v4
        with:
          token: ${{ github.token }}
          ref: rev2026
          fetch-depth: 0

      - name: Check branch head
        id: head
        shell: bash
        run: |
          set -euo pipefail
          skip=false
          expected="${GITHUB_SHA}"
          actual="$(git rev-parse HEAD)"
          if [[ "$actual" != "$expected" ]]; then
            echo "Branch moved from ${expected} to ${actual}; skipping stale bump."
            skip=true
          fi
          message="$(git log -1 --format=%s)"
          if [[ "$message" == chore:\ bump\ adaos\ version* ]]; then
            echo "Latest commit is already an AdaOS version bump; skipping."
            skip=true
          fi
          echo "skip=${skip}" >> "$GITHUB_OUTPUT"

      - name: Setup Python
        if: steps.head.outputs.skip != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Bump pyproject patch version
        if: steps.head.outputs.skip != 'true'
        id: bump
        shell: bash
        run: |
          set -euo pipefail
          old_version="$(python tools/bump_adaos_patch_version.py --current)"
          new_version="$(python tools/bump_adaos_patch_version.py)"
          echo "old_version=${old_version}" >> "$GITHUB_OUTPUT"
          echo "new_version=${new_version}" >> "$GITHUB_OUTPUT"
          echo "Bumped AdaOS ${old_version} -> ${new_version}"

      - name: Commit version bump
        if: steps.head.outputs.skip != 'true'
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet -- pyproject.toml; then
            echo "No version change to commit."
            exit 0
          fi
          git config user.name "AdaOS CI Bot"
          git config user.email "ci-bot@example.com"
          git add pyproject.toml
          git commit -m "chore: bump adaos version to ${{ steps.bump.outputs.new_version }}"
          git push origin HEAD:rev2026
