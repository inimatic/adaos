name: rasa_nlu_service_skill
version: 0.1.0
description: Local Rasa NLU-only service for AdaOS intent detection
runtime:
  kind: service
  env:
    mode: global
service:
  host: 127.0.0.1
  port: 18092
  command: ["-m", "handlers.main"]
  healthcheck:
    path: /health
    timeout_ms: 1000
permissions:
  - network
events:
  subscribe:
    - nlp.intent.detect.rasa
    - nlp.rasa.train
  publish:
    - nlp.intent.detected

